<div class="home-container">

    <h1>{{portalName}}</h1>

    <button
        [disabled]="!isPortalActive"
        (click)="onEnrollClick()">
        Enroll Now
    </button>

    <br><br>

    <p>{{message}}</p>

    <input
        type="text"
        placeholder="Search Course"
        [(ngModel)]="searchTerm">

    <br><br>

    <h3>Searching for : {{searchTerm}}</h3>

</div>
